<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="常用科研与学术工具导航，支持按名称或网址快速搜索。">
  <title>科研网站集合</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9e0ea;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --shadow: 0 12px 30px rgba(23, 32, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
      line-height: 1.5;
    }

    .page {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.15;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin: 24px 0;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 13px 14px;
      color: var(--text);
      font: inherit;
      box-shadow: 0 1px 2px rgba(23, 32, 51, 0.04);
      outline: none;
    }

    .search:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .count {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .sites {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .site-card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .site-name {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .site-url {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .visit {
      align-self: flex-start;
      border-radius: 8px;
      background: var(--primary);
      color: #ffffff;
      padding: 9px 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .visit:hover,
    .visit:focus {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .empty {
      display: none;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.7);
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    .empty.is-visible {
      display: block;
    }

    footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 24px, 980px);
        padding: 28px 0;
      }

      .toolbar {
        display: block;
      }

      .count {
        display: block;
        margin-top: 8px;
      }

      .sites {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>科研网站集合</h1>
      <p class="subtitle">常用科研与学术工具导航，支持按名称或网址快速搜索。</p>
    </header>

    <section class="toolbar" aria-label="网站搜索">
      <input class="search" id="searchInput" type="search" placeholder="搜索网站名称或网址..." autocomplete="off">
      <span class="count" id="resultCount">共 3 个网站</span>
    </section>

    <section class="sites" id="siteList" aria-label="科研网站列表"></section>
    <p class="empty" id="emptyState">没有找到匹配的网站。</p>

    <footer>
      <span>可部署到 GitHub Pages、Netlify 或 Vercel 后分享给他人使用。</span>
    </footer>
  </main>

  <script>
    const sites = [
      { name: "WOS", url: "https://webofscience.clarivate.cn/wos/woscc/basic-search" },
      { name: "知网", url: "https://www.cnki.net/" },
      { name: "ChatGPT", url: "https://chatgpt.com/" }
    ];

    const searchInput = document.querySelector("#searchInput");
    const siteList = document.querySelector("#siteList");
    const resultCount = document.querySelector("#resultCount");
    const emptyState = document.querySelector("#emptyState");

    function renderSites(filterText = "") {
      const keyword = filterText.trim().toLowerCase();
      const filteredSites = sites.filter((site) => {
        return site.name.toLowerCase().includes(keyword) ||
          site.url.toLowerCase().includes(keyword);
      });

      siteList.innerHTML = filteredSites.map((site) => `
        <article class="site-card">
          <div>
            <h2 class="site-name">${site.name}</h2>
            <p class="site-url">${site.url}</p>
          </div>
          <a class="visit" href="${site.url}" target="_blank" rel="noopener noreferrer">访问</a>
        </article>
      `).join("");

      resultCount.textContent = keyword
        ? `找到 ${filteredSites.length} 个网站`
        : `共 ${sites.length} 个网站`;
      emptyState.classList.toggle("is-visible", filteredSites.length === 0);
    }

    searchInput.addEventListener("input", (event) => {
      renderSites(event.target.value);
    });

    renderSites();
  </script>
</body>
</html>
